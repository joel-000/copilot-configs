name: Auto Bump Release

permissions:
  contents: write

on:
  pull_request:
    types:
      - closed
    branches:
      - master

concurrency:
  group: auto-bump-release-master
  cancel-in-progress: false

jobs:
  bump-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Calculate next version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          if ! [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag '$latest_tag' is not in expected v<major>.<minor>.<patch> format."
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          next_tag="v${major}.${minor}.$((patch + 1))"

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create release for next version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          api_base="https://api.github.com/repos/${REPO}"

          existing_status="$(curl -s -o /dev/null -w '%{http_code}' \
            -u "x-access-token:${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_base}/releases/tags/${NEXT_TAG}")"

          if [ "$existing_status" = "200" ]; then
            echo "Release for ${NEXT_TAG} already exists. Skipping."
            exit 0
          fi

          if [ "$existing_status" != "404" ]; then
            echo "Unexpected response while checking existing release: HTTP ${existing_status}"
            exit 1
          fi

          payload="$(printf '{"tag_name":"%s","target_commitish":"%s","name":"%s","generate_release_notes":true}' \
            "$NEXT_TAG" "$MERGE_SHA" "$NEXT_TAG")"

          response_file="$(mktemp)"
          create_status="$(curl -s -o "$response_file" -w '%{http_code}' \
            -X POST \
            -u "x-access-token:${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "${api_base}/releases" \
            -d "$payload")"

          if [ "$create_status" -lt 200 ] || [ "$create_status" -ge 300 ]; then
            echo "Failed to create release: HTTP ${create_status}"
            cat "$response_file"
            exit 1
          fi
